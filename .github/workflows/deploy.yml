name: Deploy to GitHub Pages

on:
  push:
    branches: [main, serif]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dobrodent-web/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Install dependencies
        run: npm ci
        working-directory: dobrodent-web

      - name: Build with Next.js
        run: npm run build
        working-directory: dobrodent-web

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dobrodent-web/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
